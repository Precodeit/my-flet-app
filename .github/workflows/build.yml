name: Build iOS IPA
on: workflow_dispatch

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Flet
        run: pip install flet

      - name: Create iOS Build
        # Added --no-codesign to ensure it doesn't wait for a Mac password
        run: flet build ipa --no-codesign

      - name: List files (Troubleshooting)
        run: find build -maxdepth 4

      - name: Upload Finished App
        uses: actions/upload-artifact@v4
        with:
          name: Precodeit-Flet-App
          path: |
            build/ipa/*.ipa
            build/ios/ipa/*.ipa
            build/ios/archive/*.xcarchive
            build/ios/iphoneos/*.app
          if-no-files-found: error
