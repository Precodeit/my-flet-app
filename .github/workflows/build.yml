name: Build Real iPhone App
on: workflow_dispatch

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Flet
        run: pip install flet

      - name: Build for Real Device
        # This creates the ARM64 version for real iPhones
        run: flet build ipa --no-codesign

      - name: Upload Real App Folder
        uses: actions/upload-artifact@v4
        with:
          name: Precodeit-Real-App
          # This path specifically targets the Real Device products
          path: build/flutter/ios/Runner.xcarchive/Products/Applications/*.app
          if-no-files-found: error
