name: Build iOS IPA
on: workflow_dispatch

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Flet
        run: pip install flet

      - name: Create iOS Archive
        # In Flet 0.84+, 'ios-simulator' or 'ipa' without signing flags 
        # is the correct way to get a buildable artifact.
        run: flet build ipa

      - name: Upload Finished App
        uses: actions/upload-artifact@v4
        with:
          name: Precodeit-Flet-App
          # Flet 0.84+ stores the unsigned archive here
          path: build/ios/archive/*.xcarchive
