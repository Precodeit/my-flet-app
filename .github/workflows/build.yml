name: Build Real iPhone App
on: workflow_dispatch

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Flet
        run: pip install flet

      - name: Build for Real iPhone
        run: flet build ipa

      - name: Upload iPhone App
        uses: actions/upload-artifact@v4
        with:
          name: Precodeit-iPhone-App
          # This catch-all grabs every mobile bundle created anywhere in the build folder
          path: |
            build/**/*.ipa
            build/**/*.app
            build/**/*.xcarchive
          if-no-files-found: error
